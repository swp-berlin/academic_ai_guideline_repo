<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; upgrade-insecure-requests">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), usb=(), payment=()">
<title>AI Guidelines Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: #18181b; color: #e4e4e7; font-family: system-ui, -apple-system, sans-serif; }
  #root { min-height: 100vh; }
  mark { background: #fbbf24; color: #18181b; padding: 0 1px; border-radius: 2px; }
  input:focus, select:focus, button:focus { border-color: #0ea5e9 !important; outline: none; }
  a { color: #0ea5e9; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
  .header { margin-bottom: 18px; }
  .header h1 { font-size: 20px; font-weight: 600; color: #e4e4e7; margin: 0; }
  .header p { font-size: 12px; color: #71717a; margin: 3px 0 0; }
  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; align-items: start; }
  .sidebar { border: 1px solid #27272a; border-radius: 8px; padding: 10px; background: #111113; }
  .sidebar-title { font-size: 12px; font-weight: 700; color: #d4d4d8; margin-bottom: 3px; }
  .sidebar-hint { font-size: 11px; color: #71717a; margin-bottom: 8px; }
  .sidebar-explainer { margin-top: 10px; padding-top: 10px; border-top: 1px solid #27272a; }
  .sidebar-explainer p { font-size: 11px; line-height: 1.5; color: #8b8b95; margin-bottom: 7px; }
  .sidebar-explainer p:last-child { margin-bottom: 0; }
  .code-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 8px; border-radius: 6px; border: 1.5px solid transparent; background: #18181b; color: #a1a1aa; font-size: 12px; font-weight: 500; transition: all 0.15s; margin-bottom: 4px; }
  .code-btn.active { font-weight: 600; }
  .code-btn-left { display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
  .code-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .code-name { font-weight: 700; }
  .code-label { overflow: hidden; text-overflow: ellipsis; }
  .code-count { opacity: 0.75; font-size: 11px; flex-shrink: 0; }
  .clear-btn { font-size: 11px; color: #71717a; background: none; border: 1px solid #3f3f46; border-radius: 5px; padding: 2px 7px; margin-top: 6px; }
  .clear-btn:hover { color: #a1a1aa; }
  .control { margin-bottom: 12px; }
  .control select, .control input { width: 100%; padding: 8px 10px; font-size: 13px; background: #27272a; border: 1px solid #3f3f46; border-radius: 7px; color: #e4e4e7; }
  .control input::placeholder { color: #71717a; }
  .count-line { font-size: 12px; color: #71717a; margin-bottom: 10px; }
  .doc-group { margin-bottom: 18px; }
  .doc-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #27272a; margin-bottom: 5px; gap: 8px; flex-wrap: wrap; }
  .doc-title { font-size: 13px; font-weight: 600; color: #d4d4d8; margin: 0; }
  .doc-count { font-weight: 400; color: #71717a; margin-left: 6px; }
  .doc-actions { display: flex; align-items: center; gap: 8px; }
  .coverage-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
  .full-doc-btn { font-size: 11px; color: #0ea5e9; background: none; border: 1px solid #164e63; border-radius: 4px; padding: 2px 7px; }
  .full-doc-btn:hover { border-color: #0ea5e9; }
  .segments { display: flex; flex-direction: column; gap: 1px; }
  .segment { border-left: 3px solid; padding: 8px 12px; transition: background 0.12s; border-radius: 0 4px 4px 0; }
  .segment-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
  .segment-code { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; }
  .segment-label { font-size: 11px; color: #a1a1aa; }
  .segment-inst { font-size: 11px; color: #52525b; margin-left: auto; }
  .segment-text { font-size: 13.5px; line-height: 1.6; margin: 0; color: #d4d4d8; }
  .no-results { text-align: center; padding: 40px; color: #52525b; font-size: 13px; }
  .loading { display: flex; justify-content: center; padding: 60px; color: #71717a; font-size: 14px; }
  .error { max-width: 560px; margin: 40px auto; padding: 20px; }
  .error h2 { color: #ef4444; font-size: 15px; margin-bottom: 8px; }
  .error p { color: #a1a1aa; font-size: 13px; margin-bottom: 8px; }
  .docview { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
  .back-link { background: none; border: none; color: #0ea5e9; cursor: pointer; font-size: 13px; padding: 4px 0 12px 0; }
  .back-link:hover { text-decoration: underline; }
  .doc-detail-header { margin-bottom: 16px; }
  .doc-detail-header h2 { font-size: 18px; font-weight: 600; color: #e4e4e7; margin: 0; }
  .doc-detail-meta { font-size: 12px; color: #71717a; margin-top: 3px; }
  .doc-detail-meta a { color: #0ea5e9; }
  .validation-stats { display: flex; gap: 16px; font-size: 11px; color: #71717a; margin-top: 6px; flex-wrap: wrap; }
  .coverage-bar { margin-top: 6px; height: 4px; background: #27272a; border-radius: 2px; overflow: hidden; }
  .coverage-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .skip-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #71717a; margin-bottom: 10px; cursor: pointer; }
  .proj-gap { padding: 3px 12px; font-size: 11.5px; line-height: 1.5; color: #52525b; border-left: 3px solid #27272a; white-space: pre-wrap; }
  .proj-span { border-left: 3px solid; padding: 8px 12px; border-radius: 0 4px 4px 0; margin-bottom: 1px; }
  .proj-span-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .unmatched-section { margin-top: 28px; padding-top: 16px; border-top: 1px solid #27272a; }
  .unmatched-title { font-size: 13px; font-weight: 600; color: #f97316; margin-bottom: 8px; }
  .unmatched-note { font-size: 11px; color: #52525b; margin-bottom: 10px; }
  .unmatched-card { border-left: 3px solid #ef4444; padding: 8px 12px; background: rgba(239, 68, 68, 0.06); border-radius: 0 4px 4px 0; margin-bottom: 1px; }
  .unmatched-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .unmatched-flag { font-size: 10px; color: #ef4444; margin-left: auto; font-weight: 600; }
  @media (max-width: 980px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
// Color scheme for B codes
const BC = {
  B1:  { bg: "#eef2ff", border: "#6366f1", text: "#3730a3" },
  B2:  { bg: "#f3e8ff", border: "#8b5cf6", text: "#5b21b6" },
  B3:  { bg: "#e0f2fe", border: "#0ea5e9", text: "#075985" },
  B4:  { bg: "#ccfbf1", border: "#14b8a6", text: "#115e59" },
  B5:  { bg: "#dcfce7", border: "#22c55e", text: "#14532d" },
  B6:  { bg: "#fee2e2", border: "#ef4444", text: "#7f1d1d" },
  B7:  { bg: "#fef3c7", border: "#f59e0b", text: "#78350f" },
  B8:  { bg: "#fce7f3", border: "#ec4899", text: "#831843" },
  B9:  { bg: "#ffedd5", border: "#f97316", text: "#7c2d12" },
  B10: { bg: "#cffafe", border: "#06b6d4", text: "#155e75" },
  B11: { bg: "#f3e8ff", border: "#a855f7", text: "#581c87" },
};
const DC = { bg: "#f4f4f5", border: "#a1a1aa", text: "#52525b" };
const getColor = c => BC[c] || DC;
const HIDDEN_CODES = new Set(["B13"]);

// App state
const state = {
  data: null,
  loading: true,
  error: null,
  query: "",
  activeCodes: new Set(),
  viewDocId: null,
  showSkips: false,
  renderTimeout: null,
};

// Debounced render to preserve input focus
function scheduleRender() {
  if (state.renderTimeout) clearTimeout(state.renderTimeout);
  state.renderTimeout = setTimeout(() => {
    render();
    // After rendering, find and refocus the search input
    const newInput = document.querySelector('.control input[type="text"]');
    if (newInput) {
      newInput.focus();
      newInput.setSelectionRange(newInput.value.length, newInput.value.length);
    }
  }, 50);
}

// Utility: highlight search results
function highlightText(text, query) {
  if (!query || query.length < 2) return text;
  try {
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const parts = text.split(new RegExp(`(${escaped})`, "gi"));
    return parts.map((p, i) => {
      if (p.toLowerCase() === query.toLowerCase()) {
        return `<mark>${p}</mark>`;
      }
      return p;
    }).join("");
  } catch { return text; }
}

function isVisibleCode(code) {
  return !HIDDEN_CODES.has(code);
}

function getVisibleSegments(segments) {
  return (segments || []).filter(seg => isVisibleCode(seg.B));
}

function getVisibleProjection(projection) {
  return (projection || []).filter(span => span.B === "skip" || isVisibleCode(span.B));
}

// Render
function render() {
  const root = document.getElementById("root");

  if (state.loading) {
    root.innerHTML = '<div class="loading">Loading...</div>';
    return;
  }

  if (state.error) {
    root.innerHTML = `<div class="error">
      <h2>Could not load data</h2>
      <p>${state.error}</p>
      <p style="color: #71717a; font-size: 12px; margin-top: 12px;">Place explorer_data.json next to this HTML file.</p>
    </div>`;
    return;
  }

  // Document detail view
  if (state.viewDocId) {
    const doc = state.data.documents.find(d => d.doc_id === state.viewDocId);
    if (doc) {
      root.innerHTML = '';
      renderDocView(root, doc);
      return;
    }
  }

  // Main overview
  root.innerHTML = '';
  renderOverview(root);
}

function renderOverview(root) {
  const container = document.createElement("div");
  container.className = "container";

  // Header
  const header = document.createElement("div");
  header.className = "header";
  header.innerHTML = `
    <h1>AI Guidelines Explorer</h1>
    <p>${state.data.document_count} guidelines · ${state.data.segment_count} coded segments</p>
  `;
  container.appendChild(header);

  // Layout container
  const layout = document.createElement("div");
  layout.className = "layout";

  // Main content
  const main = document.createElement("main");
  main.className = "main";

  // Jump selector
  const jumpDiv = document.createElement("div");
  jumpDiv.className = "control";
  const select = document.createElement("select");
  select.appendChild(createOption("", `Jump to guideline (${state.data.documents.length})...`));
  const sortedDocs = [...state.data.documents].sort((a, b) => a.institution.localeCompare(b.institution));
  sortedDocs.forEach(d => {
    const lbl = `${d.institution}${d.date ? ` (${d.date})` : ""}`;
    select.appendChild(createOption(d.doc_id, lbl));
  });
  select.addEventListener("change", (e) => {
    if (e.target.value) state.viewDocId = e.target.value;
    render();
  });
  jumpDiv.appendChild(select);
  main.appendChild(jumpDiv);

  // Search
  const searchDiv = document.createElement("div");
  searchDiv.className = "control";
  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Search across all guidelines...";
  input.value = state.query;
  input.addEventListener("input", (e) => {
    state.query = e.target.value;
    scheduleRender();
  });
  searchDiv.appendChild(input);
  main.appendChild(searchDiv);

  // Count line
  const allSegments = filterSegments();
  const groupedDocs = groupSegments(allSegments);
  const countDiv = document.createElement("div");
  countDiv.className = "count-line";
  const segCount = allSegments.length;
  const docCount = Object.keys(groupedDocs).length;
  countDiv.textContent = `${segCount} segment${segCount !== 1 ? "s" : ""} in ${docCount} guideline${docCount !== 1 ? "s" : ""}`;
  main.appendChild(countDiv);

  // Results
  if (segCount === 0) {
    const noResults = document.createElement("div");
    noResults.className = "no-results";
    noResults.textContent = "No segments match.";
    main.appendChild(noResults);
  } else {
    Object.entries(groupedDocs).forEach(([docId, group]) => {
      const doc = state.data.documents.find(d => d.doc_id === docId);
      const v = doc?.validation;

      const docGroup = document.createElement("div");
      docGroup.className = "doc-group";

      const header = document.createElement("div");
      header.className = "doc-header";
      const title = document.createElement("h3");
      title.className = "doc-title";
      title.innerHTML = group.inst + `<span class="doc-count">(${group.segs.length})</span>`;
      header.appendChild(title);

      const actions = document.createElement("div");
      actions.className = "doc-actions";
      if (v) {
        const coverage = document.createElement("span");
        coverage.className = "coverage-badge";
        const pct = (v.source_coverage * 100).toFixed(0);
        const coverageColor = v.source_coverage >= 0.9 ? "#22c55e" : v.source_coverage >= 0.7 ? "#f59e0b" : "#ef4444";
        const coverageBg = v.source_coverage >= 0.9 ? "rgba(34,197,94,0.15)" : v.source_coverage >= 0.7 ? "rgba(245,158,11,0.15)" : "rgba(239,68,68,0.15)";
        coverage.style.background = coverageBg;
        coverage.style.color = coverageColor;
        coverage.textContent = `${pct}% coverage`;
        actions.appendChild(coverage);
      }
      const fullBtn = document.createElement("button");
      fullBtn.className = "full-doc-btn";
      fullBtn.textContent = "full document";
      fullBtn.addEventListener("click", () => {
        state.viewDocId = docId;
        render();
      });
      actions.appendChild(fullBtn);
      header.appendChild(actions);
      docGroup.appendChild(header);

      const segsDiv = document.createElement("div");
      segsDiv.className = "segments";
      group.segs.forEach(seg => {
        const segDiv = document.createElement("div");
        segDiv.className = "segment";
        const color = getColor(seg.B);
        segDiv.style.borderLeftColor = color.border;
        segDiv.addEventListener("mouseenter", () => {
          segDiv.style.background = color.bg + "33";
        });
        segDiv.addEventListener("mouseleave", () => {
          segDiv.style.background = "transparent";
        });

        const segHeader = document.createElement("div");
        segHeader.className = "segment-header";
        const code = document.createElement("span");
        code.className = "segment-code";
        code.style.background = color.bg;
        code.style.color = color.text;
        code.textContent = seg.B;
        segHeader.appendChild(code);

        const label = document.createElement("span");
        label.className = "segment-label";
        label.textContent = seg.B_label;
        segHeader.appendChild(label);

        const inst = document.createElement("span");
        inst.className = "segment-inst";
        inst.textContent = seg._inst;
        segHeader.appendChild(inst);

        segDiv.appendChild(segHeader);

        const text = document.createElement("p");
        text.className = "segment-text";
        text.innerHTML = highlightText(seg.text, state.query);
        segDiv.appendChild(text);

        segsDiv.appendChild(segDiv);
      });
      docGroup.appendChild(segsDiv);
      main.appendChild(docGroup);
    });
  }

  layout.appendChild(main);

  // Sidebar
  const sidebar = document.createElement("aside");
  sidebar.className = "sidebar";

  const sidebarHeader = document.createElement("div");
  sidebarHeader.style.display = "flex";
  sidebarHeader.style.alignItems = "center";
  sidebarHeader.style.justifyContent = "space-between";
  sidebarHeader.style.marginBottom = "8px";

  const sidebarTitle = document.createElement("h3");
  sidebarTitle.className = "sidebar-title";
  sidebarTitle.textContent = "Code Results";
  sidebarHeader.appendChild(sidebarTitle);

  if (state.activeCodes.size > 0) {
    const clearBtn = document.createElement("button");
    clearBtn.className = "clear-btn";
    clearBtn.textContent = "clear";
    clearBtn.addEventListener("click", () => {
      state.activeCodes.clear();
      scheduleRender();
    });
    sidebarHeader.appendChild(clearBtn);
  }
  sidebar.appendChild(sidebarHeader);

  const hint = document.createElement("p");
  hint.className = "sidebar-hint";
  hint.textContent = "Filter by B code. Labels and current result counts are shown below.";
  sidebar.appendChild(hint);

  const codesDiv = document.createElement("div");
  codesDiv.style.display = "flex";
  codesDiv.style.flexDirection = "column";
  codesDiv.style.gap = "4px";

  const ck = (state.data.codebook ? Object.keys(state.data.codebook) : Object.keys(BC))
    .filter(code => isVisibleCode(code));
  const counts = {};
  allSegments.forEach(s => {
    counts[s.B] = (counts[s.B] || 0) + 1;
  });

  ck.forEach(code => {
    const color = getColor(code);
    const label = state.data.codebook?.[code] || "";
    const count = counts[code] || 0;
    const btn = document.createElement("button");
    btn.className = "code-btn";
    if (state.activeCodes.has(code)) btn.classList.add("active");

    btn.style.borderColor = state.activeCodes.has(code) ? color.border : "transparent";
    btn.style.background = state.activeCodes.has(code) ? color.bg : "#18181b";
    btn.style.color = state.activeCodes.has(code) ? color.text : "#a1a1aa";

    const left = document.createElement("span");
    left.className = "code-btn-left";
    const dot = document.createElement("span");
    dot.className = "code-dot";
    dot.style.background = color.border;
    left.appendChild(dot);

    const name = document.createElement("span");
    name.className = "code-name";
    name.textContent = code;
    left.appendChild(name);

    const labelSpan = document.createElement("span");
    labelSpan.className = "code-label";
    labelSpan.textContent = label;
    left.appendChild(labelSpan);

    btn.appendChild(left);

    const countSpan = document.createElement("span");
    countSpan.className = "code-count";
    countSpan.textContent = count;
    btn.appendChild(countSpan);

    btn.addEventListener("click", () => {
      if (state.activeCodes.has(code)) {
        state.activeCodes.delete(code);
      } else {
        state.activeCodes.add(code);
      }
      scheduleRender();
    });

    codesDiv.appendChild(btn);
  });

  sidebar.appendChild(codesDiv);

  const explainer = document.createElement("div");
  explainer.className = "sidebar-explainer";
  explainer.innerHTML = `
    <p>See the README for the full workflow and limitations. In short: source files are downloaded, text is extracted, optionally cleaned in <code>texts_clean/</code>, and then segmented and coded automatically with Mistral using a shared B-codebook.</p>
    <p>This overview shows only coded segments that were matched back to the original source text. The catch-all metadata code B13 is hidden here. In the full-document view, unmatched model output is still shown separately so it remains transparent when the model produced text that could not be located in the source.</p>
  `;
  sidebar.appendChild(explainer);

  layout.appendChild(sidebar);

  container.appendChild(layout);
  root.appendChild(container);
}

function renderDocView(root, doc) {
  const container = document.createElement("div");
  container.className = "docview";

  // Back button
  const backBtn = document.createElement("button");
  backBtn.className = "back-link";
  backBtn.textContent = "← back to overview";
  backBtn.addEventListener("click", () => {
    state.viewDocId = null;
    render();
  });
  container.appendChild(backBtn);

  // Header
  const header = document.createElement("div");
  header.className = "doc-detail-header";
  const title = document.createElement("h2");
  title.textContent = doc.institution;
  header.appendChild(title);

  const meta = document.createElement("div");
  meta.className = "doc-detail-meta";
  const visibleSegments = getVisibleSegments(doc.segments);
  const parts = [doc.category, doc.date, doc.language, `${visibleSegments.length} visible segments`].filter(Boolean);
  meta.textContent = parts.join(" · ");
  if (doc.url) {
    meta.textContent += " · ";
    const link = document.createElement("a");
    link.href = doc.url;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.textContent = "source ↗";
    meta.appendChild(link);
  }
  header.appendChild(meta);

  // Validation stats
  if (doc.validation) {
    const v = doc.validation;
    const statsDiv = document.createElement("div");
    statsDiv.className = "validation-stats";
    statsDiv.innerHTML = `
      <span>matched: ${v.matched}/${v.total}</span>
      <span style="color: ${v.source_coverage >= 0.9 ? "#22c55e" : v.source_coverage >= 0.7 ? "#f59e0b" : "#ef4444"}">coverage: ${(v.source_coverage * 100).toFixed(1)}%</span>
      ${v.unmatched_count > 0 ? `<span style="color: #f97316;">${v.unmatched_count} unmatched</span>` : ""}
    `;
    header.appendChild(statsDiv);

    // Coverage bar
    const coverageBar = document.createElement("div");
    coverageBar.className = "coverage-bar";
    const fill = document.createElement("div");
    fill.className = "coverage-fill";
    fill.style.width = `${Math.min(v.source_coverage * 100, 100)}%`;
    fill.style.background = v.source_coverage >= 0.9 ? "#22c55e" : v.source_coverage >= 0.7 ? "#f59e0b" : "#ef4444";
    coverageBar.appendChild(fill);
    header.appendChild(coverageBar);
  }

  container.appendChild(header);

  // Toggle skips
  const visibleProjection = getVisibleProjection(doc.projection);
  const hasProj = visibleProjection.length > 0;
  if (hasProj) {
    const skipLabel = document.createElement("label");
    skipLabel.className = "skip-toggle";
    const skipCheckbox = document.createElement("input");
    skipCheckbox.type = "checkbox";
    skipCheckbox.checked = state.showSkips;
    skipCheckbox.addEventListener("change", () => {
      state.showSkips = !state.showSkips;
      render();
    });
    skipLabel.appendChild(skipCheckbox);
    const skipText = document.createElement("span");
    skipText.textContent = "show structural/metadata (skipped text)";
    skipLabel.appendChild(skipText);
    container.appendChild(skipLabel);
  }

  // Main content
  const segsDiv = document.createElement("div");
  segsDiv.style.display = "flex";
  segsDiv.style.flexDirection = "column";
  segsDiv.style.gap = "1px";

  if (hasProj) {
    visibleProjection.forEach(span => {
      if (!state.showSkips && span.B === "skip") return;
      if (span.B === "skip") {
        const gap = document.createElement("div");
        gap.className = "proj-gap";
        const text = span.text.trim();
        gap.textContent = text.length > 300 ? text.slice(0, 300) + "…" : text;
        segsDiv.appendChild(gap);
      } else {
        const color = getColor(span.B);
        const spanDiv = document.createElement("div");
        spanDiv.className = "proj-span";
        spanDiv.style.borderLeftColor = color.border;

        const spanHeader = document.createElement("div");
        spanHeader.className = "proj-span-header";
        const code = document.createElement("span");
        code.className = "segment-code";
        code.style.background = color.bg;
        code.style.color = color.text;
        code.textContent = span.B;
        spanHeader.appendChild(code);

        const label = document.createElement("span");
        label.className = "segment-label";
        label.textContent = span.B_label;
        spanHeader.appendChild(label);

        spanDiv.appendChild(spanHeader);

        const text = document.createElement("p");
        text.className = "segment-text";
        text.style.whiteSpace = "pre-wrap";
        text.textContent = span.text;
        spanDiv.appendChild(text);

        segsDiv.appendChild(spanDiv);
      }
    });
  } else {
    visibleSegments.forEach(seg => {
      const color = getColor(seg.B);
      const segDiv = document.createElement("div");
      segDiv.className = "segment";
      segDiv.style.borderLeftColor = color.border;
      segDiv.addEventListener("mouseenter", () => {
        segDiv.style.background = color.bg + "33";
      });
      segDiv.addEventListener("mouseleave", () => {
        segDiv.style.background = "transparent";
      });

      const segHeader = document.createElement("div");
      segHeader.className = "segment-header";
      const code = document.createElement("span");
      code.className = "segment-code";
      code.style.background = color.bg;
      code.style.color = color.text;
      code.textContent = seg.B;
      segHeader.appendChild(code);

      const label = document.createElement("span");
      label.className = "segment-label";
      label.textContent = seg.B_label;
      segHeader.appendChild(label);

      segDiv.appendChild(segHeader);

      const text = document.createElement("p");
      text.className = "segment-text";
      text.textContent = seg.text;
      segDiv.appendChild(text);

      segsDiv.appendChild(segDiv);
    });
  }

  container.appendChild(segsDiv);

  // Unmatched
  const v = doc.validation;
  if (v && v.unmatched && v.unmatched.length > 0) {
    const unmatchedSec = document.createElement("div");
    unmatchedSec.className = "unmatched-section";

    const unmatchedTitle = document.createElement("h3");
    unmatchedTitle.className = "unmatched-title";
    unmatchedTitle.textContent = `${v.unmatched.length} unmatched segment${v.unmatched.length > 1 ? "s" : ""} (model output not found in source)`;
    unmatchedSec.appendChild(unmatchedTitle);

    const unmatchedNote = document.createElement("p");
    unmatchedNote.className = "unmatched-note";
    unmatchedNote.textContent = "These segments were coded by the model but could not be string-matched back to the original text. Often caused by the model dropping list numbers or repeating shared preambles.";
    unmatchedSec.appendChild(unmatchedNote);

    const unmatchedCards = document.createElement("div");
    unmatchedCards.style.display = "flex";
    unmatchedCards.style.flexDirection = "column";
    unmatchedCards.style.gap = "1px";

    v.unmatched.forEach(seg => {
      const color = getColor(seg.B);
      const card = document.createElement("div");
      card.className = "unmatched-card";

      const cardHeader = document.createElement("div");
      cardHeader.className = "unmatched-header";
      const code = document.createElement("span");
      code.className = "segment-code";
      code.style.background = color.bg;
      code.style.color = color.text;
      code.textContent = seg.B;
      cardHeader.appendChild(code);

      const label = document.createElement("span");
      label.className = "segment-label";
      label.textContent = seg.B_label;
      cardHeader.appendChild(label);

      const flag = document.createElement("span");
      flag.className = "unmatched-flag";
      flag.textContent = `⚠ unmatched (${seg.matched_words || "?"})`;
      cardHeader.appendChild(flag);

      card.appendChild(cardHeader);

      const text = document.createElement("p");
      text.className = "segment-text";
      text.textContent = seg.text;
      card.appendChild(text);

      unmatchedCards.appendChild(card);
    });

    unmatchedSec.appendChild(unmatchedCards);
    container.appendChild(unmatchedSec);
  }

  root.appendChild(container);
}

function filterSegments() {
  const allSegs = [];
  state.data.documents.forEach(doc => {
    doc.segments.forEach(seg => {
      if (!isVisibleCode(seg.B)) return;
      const augmented = { ...seg, _did: doc.doc_id, _inst: doc.institution };
      allSegs.push(augmented);
    });
  });

  let filtered = allSegs;
  if (state.activeCodes.size > 0) {
    filtered = filtered.filter(x => state.activeCodes.has(x.B));
  }
  if (state.query.length >= 2) {
    const q = state.query.toLowerCase();
    filtered = filtered.filter(x => x.text.toLowerCase().includes(q));
  }
  return filtered;
}

function groupSegments(filtered) {
  const g = {};
  filtered.forEach(seg => {
    if (!g[seg._did]) {
      g[seg._did] = { inst: seg._inst, segs: [] };
    }
    g[seg._did].segs.push(seg);
  });
  return g;
}

function createOption(value, text) {
  const opt = document.createElement("option");
  opt.value = value;
  opt.textContent = text;
  return opt;
}

// Load data
fetch("./explorer_data.json")
  .then(r => {
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  })
  .then(d => {
    state.data = d;
    state.loading = false;
    render();
  })
  .catch(e => {
    state.error = e.message;
    state.loading = false;
    render();
  });
</script>
