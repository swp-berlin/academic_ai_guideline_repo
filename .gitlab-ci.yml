stages:
  - build
  - release

variables:
  PACKAGE_NAME: "ai-guidelines-repo"

build-archive:
  stage: build
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - tar -czf "${PACKAGE_NAME}.${CI_COMMIT_TAG}.tar.gz" web/
    - echo "JOB_ID=$CI_JOB_ID" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - "${PACKAGE_NAME}.${CI_COMMIT_TAG}.tar.gz"
    expire_in: 1 week

release-job:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - glab config set host swp-git.swp-berlin.intern
    - glab auth login --token $CI_JOB_TOKEN
  script:
    - glab release create "$CI_COMMIT_TAG" "${PACKAGE_NAME}.${CI_COMMIT_TAG}.tar.gz" --name "Release $CI_COMMIT_TAG" --notes "Release created from tag $CI_COMMIT_TAG"
  dependencies:
    - build-archive

