stages:
  - build
  - release

variables:
  PACKAGE_NAME: "ai-guidelines-repo"

build-archive:
  stage: build
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - tar -czf "${PACKAGE_NAME}.${CI_COMMIT_TAG}.tar.gz" web/
    - echo "JOB_ID=$CI_JOB_ID" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - "${PACKAGE_NAME}.${CI_COMMIT_TAG}.tar.gz"
    expire_in: 1 week

release-job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'Release created from tag $CI_COMMIT_TAG'
    tag_name: '$CI_COMMIT_TAG'
    assets:
      links:
        - name: '${PACKAGE_NAME}.${CI_COMMIT_TAG}.tar.gz'
          url: '${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${JOB_ID}/artifacts/${PACKAGE_NAME}.${CI_COMMIT_TAG}.tar.gz'
          link_type: 'package'
  dependencies:
    - build-archive
